<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Management System – SNL Innovations</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Login Screen -->
<div id="login-screen" class="login-screen hidden">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-circle">HR</div>
      <h2 id="login-company-name">SNL Innovations</h2>
      <p>HR Management System</p>
    </div>

    <!-- Login form -->
    <div class="login-step active" id="login-step1">
      <div class="form-group" style="margin-bottom:14px">
        <label style="font-weight:600;font-size:13px;color:#334155">Select User</label>
        <select class="form-control" id="login-user-select" style="margin-top:6px">
          <option value="">— Choose your name —</option>
        </select>
      </div>
      <div class="login-divider">or enter your email directly</div>
      <div class="form-group" style="margin-bottom:12px">
        <input class="form-control" id="login-email-input" type="email" placeholder="your@email.com"
          onkeydown="if(event.key==='Enter')document.getElementById('login-password-input').focus()">
      </div>
      <div class="form-group" style="margin-bottom:6px">
        <input class="form-control" id="login-password-input" type="password" placeholder="Password"
          onkeydown="if(event.key==='Enter')Auth.login()">
      </div>
      <div id="login-error" style="color:var(--danger);font-size:12px;min-height:18px;margin-bottom:10px;text-align:center"></div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;padding:11px" onclick="Auth.login()">
        Login &rarr;
      </button>
      <div style="margin-top:10px;font-size:11px;color:var(--gray-400);text-align:center">
        Default password: <strong>Snl@1234</strong>
      </div>
    </div>
  </div>
</div>

<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-icon">HR</div>
      <div class="brand-text">
        <div class="brand-name" id="sidebar-company">SNL Innovations</div>
        <div class="brand-sub">HR Management</div>
      </div>
    </div>
    <nav class="nav">
      <a class="nav-link active" data-page="dashboard" data-label="Dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-link" data-page="employees" data-label="Employees">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Employees</span>
      </a>
      <a class="nav-link" data-page="attendance" data-label="Attendance">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Attendance</span>
      </a>
      <a class="nav-link" data-page="leaves" data-label="Leaves">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
        <span>Leave Management</span>
      </a>
      <a class="nav-link" data-page="salary" data-label="Salary">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span>Salary Config</span>
      </a>
      <a class="nav-link" data-page="payslip" data-label="Payslip">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Payslip</span>
      </a>
      <a class="nav-link" data-page="settings" data-label="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </a>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main-wrapper">
    <header class="header">
      <div class="header-left">
        <button class="btn-icon" id="sidebar-toggle" title="Toggle Sidebar">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title" id="page-title">Dashboard</h1>
      </div>
      <div class="header-right" style="display:flex;align-items:center;gap:12px">
        <span class="date-badge" id="today-date"></span>
        <div class="login-user-badge" id="header-user-badge" style="display:none">
          <div class="avatar" id="header-user-avatar"></div>
          <span id="header-user-name"></span>
        </div>
        <button class="btn-logout" id="btn-logout" onclick="Auth.logout()" style="display:none">Logout</button>
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal-box" id="modal-box">
    <div class="modal-head">
      <h3 id="modal-title">Dialog</h3>
      <button class="modal-x" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden payslip print area -->
<div id="print-area" style="display:none"></div>

<script src="app.js"></script>
</body>
</html>
